<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — T&T Viaje Asia</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080808;--s1:#111;--s2:#181818;--s3:#222;
  --w:#fff;--ws:rgba(255,255,255,.65);--wm:rgba(255,255,255,.3);--wd:rgba(255,255,255,.07);
  --b:rgba(255,255,255,.1);--bs:rgba(255,255,255,.2);
  --y:#E8FF00;--yb:rgba(232,255,0,.12);--ybb:rgba(232,255,0,.25);
  --g:#34D399;--gb:rgba(52,211,153,.12);--gbb:rgba(52,211,153,.3);
  --o:#FB923C;--ob:rgba(251,146,60,.12);--obb:rgba(251,146,60,.3);
  --r:#ff5c5c;--rb:rgba(255,92,92,.12);--rbb:rgba(255,92,92,.3);
  --p:#C084FC;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--w);min-height:100vh}
.header{background:var(--s1);border-bottom:1px solid var(--b);padding:0 24px;display:flex;align-items:center;gap:12px;height:54px}
.logo{font-size:18px;font-weight:900;letter-spacing:1px;color:var(--w)}
.logo b{color:var(--y)}
.badge{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:2px 8px;border:1px solid var(--ybb);background:var(--yb);color:var(--y);border-radius:4px}
.fase-pill{font-size:11px;font-weight:700;padding:4px 12px;border-radius:6px}
.f1{background:var(--ob);color:var(--o);border:1px solid var(--obb)}
.f2{background:var(--gb);color:var(--g);border:1px solid var(--gbb)}
.ml{margin-left:auto;display:flex;align-items:center;gap:10px}
.main{max-width:900px;margin:0 auto;padding:28px 20px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px}
.stat{background:var(--s1);border:1px solid var(--b);border-radius:12px;padding:16px}
.sn{font-size:28px;font-weight:800;color:var(--y);letter-spacing:-1px;font-family:-apple-system,sans-serif}
.sl{font-size:10px;color:var(--wm);margin-top:3px;text-transform:uppercase;letter-spacing:.1em}
.tabs{display:flex;gap:4px;margin-bottom:20px}
.tab{padding:8px 16px;border:1px solid var(--b);border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;background:transparent;color:var(--wm);font-family:inherit;transition:all .15s;letter-spacing:.04em}
.tab.active{background:var(--yb);color:var(--y);border-color:var(--ybb)}
.tab:hover{background:var(--wd);color:var(--ws)}
.slabel{font-size:10px;font-weight:700;color:var(--wm);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px}
.card{background:var(--s1);border:1px solid var(--b);border-radius:14px;padding:18px 22px;margin-bottom:12px}
label{font-size:10px;color:var(--wm);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.07em}
input[type=text],input[type=password],input[type=email],textarea,select{width:100%;padding:9px 12px;border:1px solid var(--b);border-radius:8px;font-size:13px;background:var(--s2);color:var(--w);font-family:inherit;transition:border-color .15s}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--y)}
textarea{resize:vertical;min-height:80px;line-height:1.6}
.field{margin-bottom:14px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:12px;align-items:end}
.btn{padding:9px 18px;border:1px solid var(--b);border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;background:transparent;color:var(--w);font-family:inherit;transition:all .15s;white-space:nowrap;letter-spacing:.03em}
.btn:hover{background:var(--wd)}
.btn-y{background:var(--y);color:var(--bg);border-color:var(--y)}
.btn-y:hover{background:#d4e800}
.btn-g{background:var(--gb);color:var(--g);border-color:var(--gbb)}
.btn-g:hover{background:rgba(52,211,153,.2)}
.btn-r{color:var(--r);border-color:transparent}
.btn-r:hover{background:var(--rb);border-color:var(--rbb)}
.btn-sm{padding:5px 10px;font-size:11px}
.divider{border:none;border-top:1px solid var(--b);margin:18px 0}
.gc{background:var(--s1);border:1px solid var(--b);border-radius:14px;padding:16px 20px;margin-bottom:10px}
.gc-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.gc-letra{font-size:28px;font-weight:900;color:var(--y);min-width:36px;font-family:-apple-system,sans-serif}
.gc-meta{flex:1}
.gc-nom{font-size:16px;font-weight:700}
.gc-sub{font-size:12px;color:var(--wm);margin-top:2px}
.code-b{font-size:12px;padding:3px 10px;border-radius:4px;background:var(--yb);color:var(--y);font-family:monospace;border:1px solid var(--ybb);letter-spacing:.08em}
.tag{font-size:11px;background:var(--s2);border:1px solid var(--b);border-radius:4px;padding:2px 7px;color:var(--ws)}
.tag-list{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.match-tag{background:var(--gb);color:var(--g);border-color:var(--gbb)}
.novoto{background:var(--s2);color:var(--wm)}
.alert{border-radius:8px;padding:10px 14px;font-size:12px;margin-bottom:12px}
.alert-ok{background:var(--gb);color:var(--g);border:1px solid var(--gbb)}
.alert-err{background:var(--rb);color:var(--r);border:1px solid var(--rbb)}
.alert-warn{background:var(--ob);color:var(--o);border:1px solid var(--obb)}
.empty{text-align:center;padding:40px;color:var(--wm);font-size:13px}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(6px);padding:16px}
.modal{background:var(--s1);border:1px solid var(--bs);border-radius:18px;padding:24px;width:100%;max-width:520px;max-height:88vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:800;margin-bottom:18px}
.flex-end{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
#login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-box{background:var(--s1);border:1px solid var(--b);border-radius:18px;padding:32px 28px;width:340px}
.login-logo{font-size:24px;font-weight:900;color:var(--y);margin-bottom:4px;letter-spacing:1px}
.login-sub{font-size:12px;color:var(--wm);margin-bottom:22px}
.sp{display:inline-block;width:13px;height:13px;border:1.5px solid rgba(255,255,255,.15);border-top-color:var(--y);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.res-card{background:var(--s2);border:1px solid var(--b);border-radius:10px;padding:12px 16px;margin-bottom:8px}
.res-nom{font-size:14px;font-weight:800;color:var(--y);margin-bottom:4px}
.res-badge{font-size:9px;font-weight:700;padding:2px 8px;border-radius:3px;text-transform:uppercase;letter-spacing:.06em;margin-left:8px}
.rb-super{background:var(--yb);color:var(--y);border:1px solid var(--ybb)}
.rb-match{background:var(--gb);color:var(--g);border:1px solid var(--gbb)}
.rb-solo{background:var(--s2);color:var(--wm);border:1px solid var(--b)}
</style>
</head>
<body>

<div id="login-wrap">
  <div class="login-box">
    <div class="login-logo">T<b>&</b>T</div>
    <div class="login-sub">Panel de administracion — Viaje Asia</div>
    <div class="field">
      <label>Contrasena</label>
      <input type="password" id="inp-pw" placeholder="Contrasena"/>
    </div>
    <div id="login-err" class="alert alert-err" style="display:none"></div>
    <button class="btn btn-y" style="width:100%" id="btn-login">Ingresar</button>
  </div>
</div>

<div id="app" style="display:none">
  <div class="header">
    <div class="logo">T<b>&</b>T</div>
    <div class="badge">Admin</div>
    <span class="fase-pill f1" id="fase-pill">FASE 1</span>
    <div class="ml">
      <span style="font-size:11px;color:var(--wm)" id="h-info"></span>
      <button class="btn btn-sm" id="btn-refresh">↻ Actualizar</button>
      <button class="btn btn-sm" id="btn-logout">Salir</button>
    </div>
  </div>

  <div class="main">
    <div id="gmsg"></div>
    <div class="stats">
      <div class="stat"><div class="sn" id="sg">—</div><div class="sl">Grupos</div></div>
      <div class="stat"><div class="sn" id="se">—</div><div class="sl">Estudiantes</div></div>
      <div class="stat"><div class="sn" id="sv">—</div><div class="sl">Votaron</div></div>
      <div class="stat"><div class="sn" id="sm">—</div><div class="sl">Con match</div></div>
    </div>

    <div class="tabs">
      <button class="tab active" data-s="grupos">Grupos F1</button>
      <button class="tab" data-s="resultado">Resultado F1</button>
      <button class="tab" data-s="fase2">Fase 2</button>
    </div>

    <div id="sec-grupos">
      <div class="slabel">Agregar grupo manualmente</div>
      <div class="card">
        <div class="g4">
          <div class="field"><label>Nombre / Letra</label><input type="text" id="inp-nom" placeholder="A"/></div>
          <div class="field"><label>Codigo secreto</label><input type="text" id="inp-cod" placeholder="GRA-2025"/></div>
          <div class="field"><label>Representante</label><input type="text" id="inp-rep" placeholder="Nombre"/></div>
          <div class="field"><button class="btn btn-y" style="width:100%" id="btn-crear">+ Crear</button></div>
        </div>
        <div class="field" style="margin-bottom:0">
          <label>Integrantes (uno por linea — formato: APELLIDO NOMBRE)</label>
          <textarea id="inp-ints" placeholder="GARCIA MARTIN&#10;LOPEZ ANA&#10;..."></textarea>
        </div>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div class="slabel" style="margin:0">Grupos registrados</div>
        <div style="display:flex;gap:6px">
          <button class="btn btn-sm btn-r" id="btn-reset-v1">Borrar votos F1</button>
        </div>
      </div>
      <div id="grupos-list"></div>
    </div>

    <div id="sec-resultado" style="display:none">
      <div class="slabel">Grupos formados por match</div>
      <div id="resultado-list"></div>
      <div class="divider"></div>
      <div class="alert alert-warn" style="margin-bottom:12px">Al activar Fase 2 se generan automaticamente los grupos combinados.</div>
      <button class="btn btn-g" id="btn-f2">Activar Fase 2</button>
    </div>

    <div id="sec-fase2" style="display:none">
      <div class="slabel">Grupos de fase 2</div>
      <div id="grupos2-list"></div>
      <div class="divider"></div>
      <button class="btn btn-sm btn-r" id="btn-reset-v2">Borrar votos F2</button>
    </div>
  </div>
</div>

<!-- MODAL EDITAR INTEGRANTES -->
<div class="modal-ov" id="modal-edit" style="display:none">
  <div class="modal">
    <div class="modal-title">Editar integrantes</div>
    <input type="hidden" id="edit-id"/>
    <div class="field">
      <label>Integrantes (uno por linea)</label>
      <textarea id="edit-ints" style="min-height:200px"></textarea>
    </div>
    <div id="edit-msg"></div>
    <div class="flex-end">
      <button class="btn" id="btn-cancel-edit">Cancelar</button>
      <button class="btn btn-y" id="btn-save-edit">Guardar</button>
    </div>
  </div>
</div>

<script>
const SURL = "https://script.google.com/macros/s/AKfycbyeCaT5rTP12I9KO1B7bpUYKYnM_ik_FnbCl7ktGdN9h_4_5deX38plS2Z2AkSKbYCz/exec";
let pw="", data=null;

async function api(body, timeout=20000) {
  const flat={};
  Object.keys(body).forEach(k=>{ flat[k]=typeof body[k]==="object"?JSON.stringify(body[k]):body[k]; });
  const ctrl=new AbortController();
  const tid=setTimeout(()=>ctrl.abort(),timeout);
  try {
    const res=await fetch(SURL+"?"+new URLSearchParams(flat),{method:"GET",redirect:"follow",signal:ctrl.signal});
    clearTimeout(tid);
    const txt=await res.text();
    try{return JSON.parse(txt);}catch(e){return{ok:false,error:"Respuesta invalida: "+txt.slice(0,100)};}
  } catch(e) {
    clearTimeout(tid);
    return{ok:false,error:e.name==="AbortError"?"Tiempo de espera agotado":"Error de conexion"};
  }
}

function msg(txt,type="ok"){
  const el=document.getElementById("gmsg");
  el.innerHTML=`<div class="alert alert-${type}">${txt}</div>`;
  setTimeout(()=>el.innerHTML="",5000);
}

// LOGIN
document.getElementById("btn-login").addEventListener("click",async()=>{
  const p=document.getElementById("inp-pw").value.trim();
  if(!p) return;
  const btn=document.getElementById("btn-login");
  btn.innerHTML=`<span class="sp"></span>`;btn.disabled=true;
  const r=await api({action:"admin_login",password:p});
  btn.innerHTML="Ingresar";btn.disabled=false;
  if(r.ok){
    pw=p;
    document.getElementById("login-wrap").style.display="none";
    document.getElementById("app").style.display="block";
    cargar();
  } else {
    const el=document.getElementById("login-err");
    el.textContent=r.error||"Contrasena incorrecta";
    el.style.display="block";
  }
});
document.getElementById("inp-pw").addEventListener("keydown",e=>{if(e.key==="Enter")document.getElementById("btn-login").click();});
document.getElementById("btn-logout").addEventListener("click",()=>{
  pw="";data=null;
  document.getElementById("login-wrap").style.display="flex";
  document.getElementById("app").style.display="none";
  document.getElementById("inp-pw").value="";
});

// TABS
document.querySelectorAll(".tab").forEach(t=>{
  t.addEventListener("click",()=>{
    document.querySelectorAll(".tab").forEach(x=>x.classList.toggle("active",x===t));
    ["grupos","resultado","fase2"].forEach(s=>{
      document.getElementById("sec-"+s).style.display=t.dataset.s===s?"block":"none";
    });
  });
});

async function cargar(){
  document.getElementById("grupos-list").innerHTML=`<div class="empty"><span class="sp" style="width:20px;height:20px;border-width:3px"></span></div>`;
  const r=await api({action:"get_estado",password:pw});
  if(!r.ok){msg(r.error,"err");return;}
  data=r;
  renderAll();
}

function renderAll(){
  const fase=data.fase||1;
  const fp=document.getElementById("fase-pill");
  fp.textContent="FASE "+fase;
  fp.className="fase-pill "+(fase===1?"f1":"f2");
  const total=(data.grupos||[]).reduce((s,g)=>s+(g.integrantes||[]).length,0);
  const votaron=(data.grupos||[]).filter(g=>(g.votos||[]).length>0).length;
  const conMatch=(data.grupos||[]).filter(g=>(g.matches||[]).length>0).length;
  document.getElementById("sg").textContent=(data.grupos||[]).length;
  document.getElementById("se").textContent=total;
  document.getElementById("sv").textContent=`${votaron}/${(data.grupos||[]).length}`;
  document.getElementById("sm").textContent=conMatch;
  document.getElementById("h-info").textContent=`${total} estudiantes`;
  renderGrupos();
  renderResultado();
  renderFase2();
}

function renderGrupos(){
  const grupos=data.grupos||[];
  if(!grupos.length){document.getElementById("grupos-list").innerHTML=`<div class="empty">No hay grupos. Crea el primero arriba o los estudiantes pueden armarlos desde la web.</div>`;return;}
  document.getElementById("grupos-list").innerHTML=grupos.map(g=>{
    const ints=(g.integrantes||[]).slice().sort((a,b)=>{
      const sa=typeof a==="object"?a.apellido+" "+a.nombre:a;
      const sb=typeof b==="object"?b.apellido+" "+b.nombre:b;
      return sa.localeCompare(sb,"es",{sensitivity:"base"});
    });
    const intTags=ints.map(i=>`<span class="tag">${typeof i==="object"?i.apellido+" "+i.nombre:i}</span>`).join("");
    const vHTML=(g.votos||[]).length>0
      ?(g.votos||[]).map(id=>{const gr=grupos.find(x=>x.id===id);return gr?`<span class="tag match-tag">Grupo ${gr.nombre}</span>`:""}).join(" ")
      :`<span class="tag novoto">Sin votar</span>`;
    const mHTML=(g.matches||[]).length>0
      ?(g.matches||[]).map(id=>{const gr=grupos.find(x=>x.id===id);return gr?`<span class="tag match-tag">♥ Grupo ${gr.nombre}</span>`:""}).join(" ")
      :`<span style="font-size:12px;color:var(--wm)">Sin matches</span>`;
    return `<div class="gc">
      <div class="gc-top">
        <div class="gc-letra">${g.nombre}</div>
        <div class="gc-meta">
          <div class="gc-nom">Grupo ${g.nombre}</div>
          <div class="gc-sub">${(g.integrantes||[]).length} integrantes${g.representante?" · "+g.representante:""}${g.mail?" · "+g.mail:""}</div>
        </div>
        <span class="code-b">${g.codigo}</span>
        <button class="btn btn-sm" onclick="abrirEdit('${g.id}')">Editar integrantes</button>
        <button class="btn btn-sm btn-r" onclick="eliminar('${g.id}','${g.nombre}')">Eliminar</button>
      </div>
      <div style="margin-bottom:8px">
        <div style="font-size:10px;color:var(--wm);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px">Integrantes</div>
        <div class="tag-list">${intTags||'<span style="color:var(--wm);font-size:12px">Sin integrantes</span>'}</div>
      </div>
      <div style="display:flex;gap:20px;flex-wrap:wrap">
        <div><div style="font-size:10px;color:var(--wm);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px">Voto por</div><div style="display:flex;gap:5px;flex-wrap:wrap">${vHTML}</div></div>
        <div><div style="font-size:10px;color:var(--wm);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px">Matches</div><div style="display:flex;gap:5px;flex-wrap:wrap">${mHTML}</div></div>
      </div>
    </div>`;
  }).join("");
}

function renderResultado(){
  const res=data.resultado||[];
  const conMatch=res.filter(r=>r.tipo!=="solo");
  if(!conMatch.length){document.getElementById("resultado-list").innerHTML=`<div class="empty">Todavia no hay matches.</div>`;return;}
  document.getElementById("resultado-list").innerHTML=conMatch.map(r=>{
    const badge=r.tipo==="supermatch"?`<span class="res-badge rb-super">Supermatch</span>`:`<span class="res-badge rb-match">Match</span>`;
    return `<div class="res-card">
      <div class="res-nom">Grupo ${r.nombre} ${badge} <span style="font-size:12px;font-weight:400;color:var(--wm)">${r.cantTotal} personas</span></div>
      <div style="font-size:12px;color:var(--wm)">${r.grupos.map(g=>"Grupo "+g).join(" + ")}</div>
    </div>`;
  }).join("");
}

function renderFase2(){
  const g2=data.grupos2||[];
  if(!g2.length){document.getElementById("grupos2-list").innerHTML=`<div class="empty">Activa la Fase 2 desde la pestana Resultado F1.</div>`;return;}
  document.getElementById("grupos2-list").innerHTML=g2.map(g=>{
    const mHTML=(g.matches||[]).length>0
      ?(g.matches||[]).map(m=>`<span class="tag match-tag">♥ Grupo ${m.nombre}</span>`).join(" ")
      :`<span style="font-size:12px;color:var(--wm)">Sin matches</span>`;
    return `<div class="gc">
      <div class="gc-top">
        <div class="gc-letra" style="color:var(--p)">${g.nombre}</div>
        <div class="gc-meta">
          <div class="gc-nom">Grupo ${g.nombre}</div>
          <div class="gc-sub">${(g.miembros||[]).length} integrantes${g.representante?" · "+g.representante:""}</div>
        </div>
        <span class="code-b">${g.codigo}</span>
        ${(g.votos||[]).length>0?'<span style="font-size:10px;color:var(--g);font-weight:700">Voto</span>':'<span style="font-size:10px;color:var(--wm)">Sin votar</span>'}
      </div>
      <div><div style="font-size:10px;color:var(--wm);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px">Matches F2</div><div style="display:flex;gap:5px;flex-wrap:wrap">${mHTML}</div></div>
    </div>`;
  }).join("");
}

// CREAR
document.getElementById("btn-crear").addEventListener("click",async()=>{
  const nom=document.getElementById("inp-nom").value.trim();
  const cod=document.getElementById("inp-cod").value.trim();
  const rep=document.getElementById("inp-rep").value.trim();
  const ints=document.getElementById("inp-ints").value.split("\n").map(l=>l.trim()).filter(l=>l.length>0);
  if(!nom||!cod){msg("Nombre y codigo son obligatorios","err");return;}
  const btn=document.getElementById("btn-crear");
  btn.innerHTML=`<span class="sp"></span>`;btn.disabled=true;
  const r=await api({action:"crear_grupo_admin",password:pw,nombre:nom,codigo:cod,representante:rep,integrantes:ints});
  btn.innerHTML="+ Crear";btn.disabled=false;
  if(r.ok){msg(`Grupo "${nom}" creado`);document.getElementById("inp-nom").value="";document.getElementById("inp-cod").value="";document.getElementById("inp-rep").value="";document.getElementById("inp-ints").value="";cargar();}
  else msg(r.error,"err");
});

// EDITAR INTEGRANTES
function abrirEdit(id){
  const g=(data.grupos||[]).find(x=>x.id===id);
  if(!g) return;
  document.getElementById("edit-id").value=id;
  const ints=(g.integrantes||[]).map(i=>typeof i==="object"?i.apellido+" "+i.nombre:i);
  document.getElementById("edit-ints").value=ints.join("\n");
  document.getElementById("edit-msg").innerHTML="";
  document.getElementById("modal-edit").style.display="flex";
}
document.getElementById("btn-cancel-edit").addEventListener("click",()=>{document.getElementById("modal-edit").style.display="none";});
document.getElementById("btn-save-edit").addEventListener("click",async()=>{
  const id=document.getElementById("edit-id").value;
  const ints=document.getElementById("edit-ints").value.split("\n").map(l=>l.trim()).filter(l=>l.length>0);
  const btn=document.getElementById("btn-save-edit");
  btn.innerHTML=`<span class="sp"></span>`;btn.disabled=true;
  const r=await api({action:"editar_integrantes",password:pw,id,integrantes:ints});
  btn.innerHTML="Guardar";btn.disabled=false;
  if(r.ok){document.getElementById("modal-edit").style.display="none";msg("Integrantes actualizados");cargar();}
  else document.getElementById("edit-msg").innerHTML=`<div class="alert alert-err">${r.error}</div>`;
});

// ELIMINAR
async function eliminar(id,nom){
  if(!confirm(`Eliminar Grupo "${nom}"?`)) return;
  const r=await api({action:"eliminar_grupo",password:pw,id});
  if(r.ok){msg(`Grupo "${nom}" eliminado`);cargar();}else msg(r.error,"err");
}

document.getElementById("btn-f2").addEventListener("click",async()=>{
  if(!confirm("Activar Fase 2? Se generan los grupos combinados a partir de los matches actuales.")) return;

  btn.innerHTML=`<span class="sp"></span>`;btn.disabled=true;

  btn.innerHTML="Activar Fase 2";btn.disabled=false;
  if(r.ok){msg("Fase 2 activada");cargar();}else msg(r.error,"err");
});
